x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

services:

  redis:
    image: redis:7-alpine
    container_name: ambience_rag_redis
    ports:
      - "6379:6379"
    logging: *default-logging
    networks:
      - ambience_rag_net

  db_vector:
    image: pgvector/pgvector:pg16
    container_name: ambience_rag_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - ambience_rag_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  rag_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ambience_rag
    depends_on:
      db_vector:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_vector:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LOCAL_LLM_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_FALLBACK_ALERT_WEBHOOK_URL: ${LLM_FALLBACK_ALERT_WEBHOOK_URL:-}
      LLM_FALLBACK_ALERT_TIMEOUT_SECONDS: ${LLM_FALLBACK_ALERT_TIMEOUT_SECONDS:-2.0}
    ports:
      - "8001:8001"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./configs:/app/configs
      - ./data:/app/data
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - ambience_rag_net

  rag_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ambience_rag_worker
    depends_on:
      redis:
        condition: service_healthy
      db_vector:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_vector:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LOCAL_LLM_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_FALLBACK_ALERT_WEBHOOK_URL: ${LLM_FALLBACK_ALERT_WEBHOOK_URL:-}
      LLM_FALLBACK_ALERT_TIMEOUT_SECONDS: ${LLM_FALLBACK_ALERT_TIMEOUT_SECONDS:-2.0}
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./configs:/app/configs
      - ./logs:/app/logs
    command: python scripts/workers/run_retry_worker.py
    stop_signal: SIGTERM
    stop_grace_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    networks:
      - ambience_rag_net

networks:
  ambience_rag_net:
    driver: bridge

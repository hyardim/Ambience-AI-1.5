x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

services:

  mailpit:
    image: axllent/mailpit:latest
    container_name: ambience_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    logging: *default-logging
    networks:
      - ambience_net

  redis:
    image: redis:7-alpine
    container_name: ambience_rag_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks:
      - ambience_net

  # 1. The Vector Database
  db_vector:
    image: pgvector/pgvector:pg16
    container_name: ambience_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ambience_knowledge}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - ambience_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-ambience_knowledge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # 2. Backend API: Handles Auth, Chats
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ambience_backend
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@db_vector:5432/${POSTGRES_DB:-ambience_knowledge}
      - RAG_SERVICE_URL=http://rag_service:8001
      - RAG_INTERNAL_API_KEY=${RAG_INTERNAL_API_KEY:-dev-rag-internal-key}
      - RAG_REQUEST_TIMEOUT_SECONDS=120
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - NEW_USERS_REQUIRE_EMAIL_VERIFICATION=${NEW_USERS_REQUIRE_EMAIL_VERIFICATION:-true}
      - ALLOW_LEGACY_UNVERIFIED_LOGIN=${ALLOW_LEGACY_UNVERIFIED_LOGIN:-false}
      - EMAIL_VERIFICATION_TOKEN_TTL_MINUTES=${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-60}
      - EMAIL_VERIFICATION_TOKEN_PEPPER=${EMAIL_VERIFICATION_TOKEN_PEPPER}
      - RESEND_VERIFICATION_RATE_LIMIT_WINDOW_SECONDS=${RESEND_VERIFICATION_RATE_LIMIT_WINDOW_SECONDS:-900}
      - RESEND_VERIFICATION_RATE_LIMIT_MAX_ATTEMPTS=${RESEND_VERIFICATION_RATE_LIMIT_MAX_ATTEMPTS:-5}
      - EMAIL_VERIFICATION_EMAIL_LOG_ONLY=${EMAIL_VERIFICATION_EMAIL_LOG_ONLY:-false}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - REDIS_URL=redis://redis:6379/0
      - CACHE_ENABLED=true
      - PASSWORD_RESET_TOKEN_TTL_MINUTES=${PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
      - FORGOT_PASSWORD_RATE_LIMIT_WINDOW_SECONDS=${FORGOT_PASSWORD_RATE_LIMIT_WINDOW_SECONDS:-900}
      - FORGOT_PASSWORD_RATE_LIMIT_MAX_ATTEMPTS=${FORGOT_PASSWORD_RATE_LIMIT_MAX_ATTEMPTS:-5}
      - PASSWORD_RESET_EMAIL_LOG_ONLY=${PASSWORD_RESET_EMAIL_LOG_ONLY:-false}
    ports:
      - "8000:8000"
    depends_on:
      db_vector:
        condition: service_healthy
      rag_service:
        condition: service_healthy
      mailpit:
        condition: service_started
    logging: *default-logging
    networks:
      - ambience_net

  # 3. RAG Service: AI Engine (Ollama/Med42)
  rag_service:
    build:
      context: ./rag_service
      dockerfile: Dockerfile
    container_name: ambience_rag
    restart: unless-stopped
    depends_on:
      db_vector:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./rag_service/src:/app/src
      - ./rag_service/data:/app/data
      - ./rag_service/configs:/app/configs
      - ./rag_service/logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@db_vector:5432/${POSTGRES_DB:-ambience_knowledge}
      - REDIS_URL=redis://redis:6379/0
      - RAG_INTERNAL_API_KEY=${RAG_INTERNAL_API_KEY:-dev-rag-internal-key}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=thewindmom/llama3-med42-8b
      - LOCAL_LLM_BASE_URL=http://host.docker.internal:11434
      - LOCAL_LLM_MODEL=thewindmom/llama3-med42-8b
      - CLOUD_LLM_BASE_URL=${CLOUD_LLM_BASE_URL}
      - CLOUD_LLM_MODEL=${CLOUD_LLM_MODEL:-m42-health/Llama3-Med42-70B}
      - CLOUD_LLM_API_KEY=${CLOUD_LLM_API_KEY}
      - LLM_ROUTE_THRESHOLD=${LLM_ROUTE_THRESHOLD:-0.65}
      - LLM_FALLBACK_ALERT_WEBHOOK_URL=${LLM_FALLBACK_ALERT_WEBHOOK_URL:-}
      - LLM_FALLBACK_ALERT_TIMEOUT_SECONDS=${LLM_FALLBACK_ALERT_TIMEOUT_SECONDS:-2.0}
      - GUIDELINE_SYNC_ENABLED=${GUIDELINE_SYNC_ENABLED:-false}
      - GUIDELINE_SYNC_INTERVAL_MINUTES=${GUIDELINE_SYNC_INTERVAL_MINUTES:-10080}
      - GUIDELINE_SYNC_RUN_ON_STARTUP=${GUIDELINE_SYNC_RUN_ON_STARTUP:-true}
      - GUIDELINE_SYNC_TIMEOUT_SECONDS=${GUIDELINE_SYNC_TIMEOUT_SECONDS:-900}
    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

    networks:
      - ambience_net

  rag_worker:
    build:
      context: ./rag_service
      dockerfile: Dockerfile
    container_name: ambience_rag_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db_vector:
        condition: service_healthy
    volumes:
      - ./rag_service/src:/app/src
      - ./rag_service/scripts:/app/scripts
      - ./rag_service/logs:/app/logs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LLM_FALLBACK_ALERT_WEBHOOK_URL=${LLM_FALLBACK_ALERT_WEBHOOK_URL:-}
      - LLM_FALLBACK_ALERT_TIMEOUT_SECONDS=${LLM_FALLBACK_ALERT_TIMEOUT_SECONDS:-2.0}
    command: python scripts/workers/run_retry_worker.py
    stop_signal: SIGTERM
    stop_grace_period: 60s
    logging: *default-logging
    networks:
      - ambience_net

  # 4. Nginx — TLS termination and reverse proxy (production)
  # In development you can comment this out and access services directly on their ports.
  # In production, place SSL certs in nginx/certs/ and set FRONTEND_BASE_URL to your domain.
  nginx:
    image: nginx:alpine
    container_name: ambience_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ambience_net
    profiles:
      - production

  # 5. Frontend: The React UI
  frontend:
    build: ./frontend
    container_name: ambience_frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
    environment:
      - DOCKER_ENV=true
    logging: *default-logging
      - VITE_STORAGE_KEY=${VITE_STORAGE_KEY}
      - VITE_STORAGE_KEY=${VITE_STORAGE_KEY}
        logging: *default-logging
    networks:
      - ambience_net

networks:
  ambience_net:
    driver: bridge

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ambience_rag_redis
    ports:
      - "6379:6379"
    networks:
      - ambience_net

  # 1. The Vector Database
  db_vector:
    image: pgvector/pgvector:pg16
    container_name: ambience_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: team20_password
      POSTGRES_DB: ambience_knowledge
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - ambience_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ambience_knowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend API: Handles Auth, Chats
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile  # ✅ Fixed: Dockerfile is now at root
    container_name: ambience_backend
    volumes:
      # ✅ Fixed: Maps local 'src' to container's '/app/src' for hot-reloading
      - ./backend/src:/app/src
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://admin:team20_password@db_vector:5432/ambience_knowledge
      - RAG_SERVICE_URL=http://rag_service:8001
      - RAG_REQUEST_TIMEOUT_SECONDS=120
      - REDIS_URL=redis://redis:6379/0
      - CACHE_ENABLED=true
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - PASSWORD_RESET_TOKEN_TTL_MINUTES=${PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
      - FORGOT_PASSWORD_RATE_LIMIT_WINDOW_SECONDS=${FORGOT_PASSWORD_RATE_LIMIT_WINDOW_SECONDS:-900}
      - FORGOT_PASSWORD_RATE_LIMIT_MAX_ATTEMPTS=${FORGOT_PASSWORD_RATE_LIMIT_MAX_ATTEMPTS:-5}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - PASSWORD_RESET_EMAIL_LOG_ONLY=${PASSWORD_RESET_EMAIL_LOG_ONLY:-true}

    ports:
      - "8000:8000"
    depends_on:
      db_vector:
        condition: service_healthy
    networks:
      - ambience_net

  # 3. RAG Service: AI Engine (Ollama/Med42)
  rag_service:
    build:
      context: ./rag_service
      dockerfile: Dockerfile  # ✅ Fixed: Dockerfile is now at root
    container_name: ambience_rag
    depends_on:
      - db_vector
      - redis
    ports:
      - "8001:8001"
    volumes:
      # ✅ Fixed: Maps local 'src' to container's '/app/src'
      - ./rag_service/src:/app/src
      # Mount data and configs so /docs/{doc_id} can serve PDFs and ingestion sees updated sources
      - ./rag_service/data:/app/data
      - ./rag_service/configs:/app/configs
    environment:
      - DATABASE_URL=postgresql://admin:team20_password@db_vector:5432/ambience_knowledge
      - REDIS_URL=redis://redis:6379/0
      # Allow connection to host Ollama (Mac)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=thewindmom/llama3-med42-8b
      - LOCAL_LLM_BASE_URL=http://host.docker.internal:11434
      - LOCAL_LLM_MODEL=thewindmom/llama3-med42-8b
      - CLOUD_LLM_BASE_URL=${CLOUD_LLM_BASE_URL:-https://aaw0zkgatyq013-8000.proxy.runpod.net/v1}
      - CLOUD_LLM_MODEL=${CLOUD_LLM_MODEL:-m42-health/Llama3-Med42-70B}
      - CLOUD_LLM_API_KEY=${CLOUD_LLM_API_KEY:-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}
      - LLM_ROUTE_THRESHOLD=${LLM_ROUTE_THRESHOLD:-0.65}
    
    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - ambience_net

  rag_worker:
    build:
      context: ./rag_service
      dockerfile: Dockerfile
    container_name: ambience_rag_worker
    depends_on:
      - redis
    volumes:
      - ./rag_service/src:/app/src
      - ./rag_service/scripts:/app/scripts
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: python scripts/run_retry_worker.py
    networks:
      - ambience_net

  # 4. Frontend: The React UI
  frontend:
    build: ./frontend
    container_name: ambience_frontend
    ports:
      - "3000:5173"  # ✅ Fixed: Maps Host 3000 -> Container 5173 (Vite default)
    volumes:
      - ./frontend/src:/app/src  # Hot reload for React
      - ./frontend/vite.config.ts:/app/vite.config.ts  # Include vite config for hot reload
    environment:
      - DOCKER_ENV=true
    networks:
      - ambience_net

networks:
  ambience_net:
    driver: bridge